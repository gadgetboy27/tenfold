<svg width="560" height="140" viewBox="0 0 560 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tenfold">
  <defs>
    <linearGradient id="tf-lg" x1="20" y1="20" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9D7CFF"/>
      <stop offset="1" stop-color="#6438F5"/>
    </linearGradient>
  </defs>
  <!-- Mark (burst) at 70,70 scaled from the 512 master -->
  <g fill="url(#tf-lg)" transform="translate(70 70) scale(0.21) translate(-256 -256)">
    <rect x="236" y="40"  width="40" height="216" rx="20"/>
    <rect x="236" y="150" width="40" height="106" rx="20" transform="rotate(60 256 256)"/>
    <rect x="236" y="40"  width="40" height="216" rx="20" transform="rotate(120 256 256)"/>
    <rect x="236" y="150" width="40" height="106" rx="20" transform="rotate(180 256 256)"/>
    <rect x="236" y="40"  width="40" height="216" rx="20" transform="rotate(240 256 256)"/>
    <rect x="236" y="150" width="40" height="106" rx="20" transform="rotate(300 256 256)"/>
    <circle cx="256" cy="256" r="34"/>
  </g>
  <!-- Wordmark: canonical face is the app serif; Georgia stack as a portable fallback -->
  <text x="150" y="90" font-family="Georgia, 'Times New Roman', ui-serif, serif" font-size="74" font-weight="700" fill="#F0F0F0" letter-spacing="-1">tenfold</text>
</svg>
