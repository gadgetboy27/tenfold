kind = "web"
previewPath = "/"
title = "Tenfold"
version = "1.0.0"
id = "artifacts/tenfold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18928

[services.development]
run = "cd /home/runner/workspace/tenfold-next && npm run dev"

[services.env]
PORT = "18928"
BASE_PATH = "/"

[services.production]

[services.production.build]
args = ["npm", "--prefix", "tenfold-next", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["npm", "--prefix", "tenfold-next", "run", "start"]

[services.production.run.env]
PORT = "18928"
NODE_ENV = "production"
